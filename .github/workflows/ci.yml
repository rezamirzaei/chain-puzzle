name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Build.props
            global.json

      - name: Restore
        run: dotnet restore Solution2.sln

      - name: Build
        run: dotnet build Solution2.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Solution2.sln --configuration Release --no-build
